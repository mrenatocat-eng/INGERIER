<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Calculadora Ingeniería Construcción</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',Arial;
}

body{
margin:0;
background:#eef2f5;
color:#263238;
}


header{
background:#0d1b2a;
color:white;
padding:25px;
text-align:center;
border-bottom:5px solid #ffb703;
}


header h1{
margin:0;
font-size:32px;
}

header p{
margin-top:8px;
color:#ddd;
}



.container{
width:95%;
max-width:1200px;
margin:auto;
}



.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
margin-top:25px;
}



.card{

background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px #bbb;

}



.card h2{

background:#0d1b2a;
color:white;
padding:12px;
border-radius:8px;

}



label{
font-weight:bold;
display:block;
margin-top:10px;
}


input{

width:100%;
padding:10px;
margin-top:5px;
border:1px solid #bbb;
border-radius:5px;

}



button{

background:#ffb703;
border:none;
padding:15px;
width:100%;
margin-top:20px;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;

}


button:hover{

background:#fb8500;

}



.resultado{

margin-top:20px;
padding:15px;
background:#e8f5e9;
border-left:5px solid green;
border-radius:8px;

}



.total{

background:#0d1b2a;
color:white;
padding:20px;
font-size:22px;
border-radius:10px;
margin-top:20px;

}


</style>

</head>


<body>


<header>

<h1>🏗️ CALCULADORA DE INGENIERÍA DE CONSTRUCCIÓN</h1>

<p>Metrados - Materiales - Presupuesto</p>

</header>



<div class="container">


<div class="grid">


<!-- LADRILLOS -->

<div class="card">

<h2>🧱 Muros de ladrillo</h2>


<label>Largo muro (m)</label>
<input id="ml">


<label>Altura muro (m)</label>
<input id="ma">


<label>Largo ladrillo cm</label>
<input id="ll" value="24">


<label>Alto ladrillo cm</label>
<input id="lh" value="10">


<label>Junta vertical cm</label>
<input id="jv" value="2">


<label>Junta horizontal cm</label>
<input id="jh" value="2">


<label>Precio millar ladrillo S/</label>
<input id="pl" value="850">


<button onclick="calcLadrillo()">
CALCULAR LADRILLOS
</button>


<div id="resL" class="resultado"></div>


</div>




<!-- CONCRETO -->

<div class="card">

<h2>🏗️ Concreto</h2>


<label>Volumen concreto m³</label>

<input id="vol">


<h3>Dosificación</h3>


<label>Cemento</label>
<input id="cem" value="1">


<label>Arena fina</label>
<input id="arena" value="2">


<label>Grava</label>
<input id="grava" value="3">


<h3>Precios</h3>


<label>Cemento bolsa 42.5kg S/</label>
<input id="pcem" value="32">


<label>Arena fina m³ S/</label>
<input id="pare" value="70">


<label>Grava m³ S/</label>
<input id="pgrav" value="90">


<button onclick="calcConcreto()">

CALCULAR CONCRETO

</button>


<div id="resC" class="resultado"></div>


</div>




<!-- COLUMNAS -->

<div class="card">

<h2>🏛️ Columnas</h2>


<label>Número columnas</label>
<input id="nc">


<label>Largo cm</label>
<input id="cl">


<label>Ancho cm</label>
<input id="ca">


<label>Altura m</label>
<input id="ch">


<button onclick="calcColumna()">

CALCULAR COLUMNAS

</button>


<div id="resCol" class="resultado"></div>


</div>





<!-- LOSA -->

<div class="card">

<h2>🏢 Losa maciza</h2>


<label>Largo m</label>
<input id="losL">


<label>Ancho m</label>
<input id="losA">


<label>Espesor cm</label>
<input id="losE">


<button onclick="calcLosa()">

CALCULAR LOSA

</button>


<div id="resLos" class="resultado"></div>


</div>



</div>



<div id="total" class="total">

Costo total materiales: S/ 0

</div>


</div>




<script>


let costoTotal=0;



function calcLadrillo(){


let largo=ml.value*100;
let alto=ma.value*100;


let fila=Math.floor(largo/(ll.value*1+jv.value*1));

let col=Math.floor(alto/(lh.value*1+jh.value*1));


let cantidad=fila*col;


let costo=(cantidad/1000)*pl.value;


costoTotal+=costo;


resL.innerHTML=

`
<b>Ladrillos:</b> ${cantidad} und<br>

Equivalente:
${(cantidad/1000).toFixed(2)} millares<br><br>

Costo:
S/ ${costo.toFixed(2)}

`;

actualizar();


}





function calcConcreto(){


let volumen=vol.value;


let suma=
cem.value*1+
arena.value*1+
grava.value*1;



let cemento=(cem.value/suma)*volumen;

let aren=(arena.value/suma)*volumen;

let grav=(grava.value/suma)*volumen;



let bolsas=(cemento*1440)/42.5;



let costo=
(bolsas*pcem.value)+
(aren*pare.value)+
(grav*pgrav.value);



costoTotal+=costo;


resC.innerHTML=

`

Cemento:
${bolsas.toFixed(2)} bolsas (42.5 kg)<br>

Arena fina:
${aren.toFixed(2)} m³<br>

Grava:
${grav.toFixed(2)} m³<br><br>


Costo:
S/ ${costo.toFixed(2)}

`;

actualizar();


}





function calcColumna(){


let volumen=
nc.value*
(cl.value/100)*
(ca.value/100)*
(ch.value);



resCol.innerHTML=

`
Volumen concreto columnas:

<b>${volumen.toFixed(2)} m³</b>

`;

vol.value=volumen.toFixed(2);


}





function calcLosa(){


let volumen=
losL.value*
losA.value*
(losE.value/100);



resLos.innerHTML=

`

Volumen concreto:

<b>${volumen.toFixed(2)} m³</b>

`;

vol.value=volumen.toFixed(2);


}



function actualizar(){

total.innerHTML=

"Costo total materiales: S/ "+
costoTotal.toFixed(2);

}



</script>


</body>

</html>
